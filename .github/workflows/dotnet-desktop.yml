name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish demo (net462)
        run: dotnet publish examples/FlintUI.Example.csproj -c Release -f net462 -o publish/net462

      - name: Publish demo (net10.0-windows)
        run: dotnet publish examples/FlintUI.Example.csproj -c Release -f net10.0-windows -o publish/net10.0-windows

      - name: Zip builds
        shell: pwsh
        run: |
          Compress-Archive -Path publish/net462/* -DestinationPath FlintUI-Demo-net462.zip
          Compress-Archive -Path publish/net10.0-windows/* -DestinationPath FlintUI-Demo-net10.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FlintUI-Demo-net462.zip
            FlintUI-Demo-net10.zip
          generate_release_notes: true
