name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish demo
        run: dotnet publish examples/FlintUI.Example.csproj -c Release -f net48 -o publish

      - name: Zip build
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath FlintUI-Demo.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FlintUI-Demo.zip
          generate_release_notes: true
